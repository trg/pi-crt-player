# pi-crt-player — mpv config for Raspberry Pi 4 -> small 4:3 CRT over HDMI
# Installed to ~/.config/mpv/mpv.conf by setup.sh

# Output via the V3D GPU straight to the display through DRM/KMS (no desktop).
# GPU scaling is far cheaper than the CPU software scaler used by vo=drm.
vo=gpu
gpu-context=drm

# Pin the output to a CRT-friendly low resolution. Without this, mpv grabs the
# first advertised mode (often 4K) and scaling that chokes the Pi.
# Use 640x480 instead if 720x480 looks stretched on your set.
drm-mode=720x480

# Use the Pi 4's hardware H.264 decoder. Falls back to software if unavailable.
hwdec=v4l2m2m-copy

# Force H.264 (avc1) at <=480p from YouTube. The Pi 4 has no hardware decode for
# VP9/AV1, and the CRT is low-res anyway, so this keeps playback smooth.
ytdl-format=bestvideo[vcodec^=avc1][height<=480]+bestaudio/best[height<=480]/best[height<=480]

# Fill the 4:3 screen by cropping the sides of 16:9 video.
# Set to 0.0 to letterbox instead (whole image, black bars top/bottom).
panscan=1.0

# Route audio to the HDMI0 port (the one nearest the USB-C power connector).
# Use vc4hdmi1 if your screen is on the second HDMI port.
audio-device=alsa/hdmi:CARD=vc4hdmi0,DEV=0
